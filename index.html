<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airline PNR</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#dbeafe,#f0f9ff);
}

/* HEADER */
.header {
    text-align: center;
    padding: 20px;
    font-size: 22px;
    font-weight: bold;
    color: #0d47a1;
}

/* SEARCH GLASS */
.search {
    max-width: 420px;
    margin: auto;
    padding: 15px;
}

.search-box {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.3);
    padding: 15px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    outline: none;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg,#00c853,#00e676);
    color: white;
    font-weight: bold;
}

/* TICKET */
.ticket {
    max-width: 420px;
    margin: 20px auto;
    border-radius: 25px;
    overflow: hidden;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.15);
    animation: fade 0.4s ease;
}

@keyframes fade {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1;}
}

/* TOP */
.top {
    padding: 20px;
    color: #0d47a1;
    background: linear-gradient(135deg,#e3f2fd,#bbdefb);
}

.route {
    font-size: 26px;
    font-weight: bold;
}

/* CONTENT */
.middle {
    padding: 15px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.label {
    font-size: 11px;
    color: #666;
}

.value {
    font-weight: bold;
    font-size: 15px;
}

/* STATUS */
.status {
    margin-top: 12px;
    padding: 10px;
    border-radius: 20px;
    text-align: center;
    font-weight: bold;
    background: #fff3cd;
    color: #856404;
}

/* QR */
.qr {
    text-align: center;
    margin-top: 15px;
}

.footer {
    text-align: center;
    padding: 10px;
    font-size: 12px;
    color: #888;
}
</style>
</head>

<body>

<div class="header">✈️ Airline Ticket</div>

<div class="search">
<div class="search-box">
<input id="pnr" placeholder="Masukkan kode booking">
<button onclick="cek()">Cek Tiket</button>
</div>
</div>

<div id="hasil"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

// CONFIG
const firebaseConfig = {
  apiKey: "ISI_APIKEY",
  authDomain: "ISI_DOMAIN",
  projectId: "ISI_PROJECT_ID",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// FORMAT
function proper(text){
return text.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase());
}

// CEK
async function cek(){

let pnr = document.getElementById("pnr").value.toUpperCase();

let doc = await db.collection("tickets").doc(pnr).get();

if(!doc.exists){
document.getElementById("hasil").innerHTML =
"<div style='text-align:center;margin-top:20px;color:#555'>PNR tidak ditemukan</div>";
return;
}

let d = doc.data();
let p = d.penumpang[0];

// RENDER
document.getElementById("hasil").innerHTML = `
<div class="ticket">

<div class="top">
<div>${d.maskapai}</div>
<div class="route">${d.dari} ✈ ${d.ke}</div>
</div>

<div class="middle">

<div class="grid">
<div><div class="label">Passenger</div><div class="value">${proper(p.nama)}</div></div>
<div><div class="label">Seat</div><div class="value">${p.seat}</div></div>

<div><div class="label">Flight</div><div class="value">${d.flight}</div></div>
<div><div class="label">Date</div><div class="value">${d.tanggal}</div></div>

<div><div class="label">Boarding</div><div class="value">${d.boarding}</div></div>
<div><div class="label">Gate</div><div class="value">${d.gate}</div></div>

<div><div class="label">Terminal</div><div class="value">${d.terminal}</div></div>
</div>

<div class="status">${d.status}</div>

<div class="qr">
<img src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${pnr}">
</div>

</div>

<div class="footer">Show this QR at boarding gate</div>

</div>
`;
}

</script>

</body>
</html>
