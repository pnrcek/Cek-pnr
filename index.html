<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PNR Airline System</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0d47a1, #42a5f5);
    color: white;
}

.header {
    text-align: center;
    font-size: 24px;
    padding: 20px;
    font-weight: bold;
}

.container {
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* CARD */
.card {
    width: 90%;
    max-width: 400px;
    background: rgba(255,255,255,0.15);
    padding: 20px;
    border-radius: 20px;
    margin-top: 15px;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border-radius: 10px;
    border: none;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    background: #00c853;
    color: white;
    font-weight: bold;
}

/* TICKET */
.ticket {
    width: 90%;
    max-width: 400px;
    margin-top: 20px;
    border-radius: 20px;
    overflow: hidden;
    background: white;
    color: black;
}

.middle {
    padding: 15px;
    background: #f5f5f5;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.label { font-size: 12px; color: gray; }
.value { font-weight: bold; }

.nav {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.nav button {
    width: 50%;
}

.qr {
    text-align: center;
    margin-top: 15px;
}

.pdf-btn {
    background: orange;
}

.admin {
    background: #222;
}
</style>
</head>

<body>

<div class="header">✈️ Airline PNR System</div>

<div class="container">

<!-- CEK -->
<div class="card">
<input id="pnr" placeholder="Masukkan kode booking">
<button onclick="cek()">Cek Tiket</button>
</div>

<!-- ADMIN -->
<div class="card">
<h3>Admin Input</h3>

<input id="a_pnr" placeholder="PNR">
<input id="a_maskapai" placeholder="Maskapai (Lion Air / Citilink)">
<input id="a_nama" placeholder="Nama">
<input id="a_seat" placeholder="Seat">
<input id="a_flight" placeholder="Flight">
<input id="a_dari" placeholder="Dari (UPG)">
<input id="a_ke" placeholder="Ke (CGK)">
<input id="a_tanggal" placeholder="Tanggal">
<input id="a_boarding" placeholder="Boarding">
<input id="a_gate" placeholder="Gate">
<input id="a_terminal" placeholder="Terminal">
<input id="a_status" placeholder="Status">

<button class="admin" onclick="simpan()">Simpan Tiket</button>
</div>

<div id="hasil"></div>

</div>

<!-- LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

let current = null;
let index = 0;

/* SIMPAN */
function simpan(){
let pnr = document.getElementById("a_pnr").value.toUpperCase();

let data = {
maskapai: document.getElementById("a_maskapai").value,
flight: document.getElementById("a_flight").value,
dari: document.getElementById("a_dari").value,
ke: document.getElementById("a_ke").value,
tanggal: document.getElementById("a_tanggal").value,
boarding: document.getElementById("a_boarding").value,
gate: document.getElementById("a_gate").value,
terminal: document.getElementById("a_terminal").value,
status: document.getElementById("a_status").value,
penumpang: [
{
nama: document.getElementById("a_nama").value,
seat: document.getElementById("a_seat").value
}
]
};

localStorage.setItem(pnr, JSON.stringify(data));
alert("Tiket berhasil disimpan!");
}

/* CEK */
function cek(){
let pnr = document.getElementById("pnr").value.toUpperCase();
let data = localStorage.getItem(pnr);

if(!data){
document.getElementById("hasil").innerHTML = `<div style="margin-top:20px;">PNR tidak ditemukan</div>`;
return;
}

current = JSON.parse(data);
index = 0;
render();
}

/* RENDER */
function render(){
let d = current;
let p = d.penumpang[index];

let color = "#0d47a1";
let logo = "✈️";

if(d.maskapai){
if(d.maskapai.toLowerCase().includes("lion")){color="#d32f2f"; logo="🦁";}
if(d.maskapai.toLowerCase().includes("citilink")){color="#00c853"; logo="🟢";}
if(d.maskapai.toLowerCase().includes("garuda")){color="#1565c0"; logo="🕊️";}
}

let statusColor = "orange";
if(d.status.toLowerCase().includes("confirmed")) statusColor="#00e676";
if(d.status.toLowerCase().includes("boarding")) statusColor="#ffea00";
if(d.status.toLowerCase().includes("departed")) statusColor="#00c853";

document.getElementById("hasil").innerHTML = `
<div class="ticket" id="ticket">

<div style="background:${color};color:white;padding:15px;">
<b>${logo} ${d.maskapai || "Airline"}</b><br>
<b style="font-size:20px">${d.dari} ✈ ${d.ke}</b><br>
<small>BOARDING PASS</small>
</div>

<div class="middle">

<div class="grid">
<div><div class="label">Passenger</div><div class="value">${p.nama}</div></div>
<div><div class="label">Seat</div><div class="value">${p.seat}</div></div>

<div><div class="label">Flight</div><div class="value">${d.flight}</div></div>
<div><div class="label">Date</div><div class="value">${d.tanggal}</div></div>

<div><div class="label">Boarding</div><div class="value">${d.boarding}</div></div>
<div><div class="label">Gate</div><div class="value">${d.gate}</div></div>

<div><div class="label">Terminal</div><div class="value">${d.terminal}</div></div>
</div>

<div style="margin-top:10px;padding:10px;background:${statusColor};text-align:center;border-radius:20px;">
${d.status}
</div>

<div class="nav">
<button onclick="prev()">⬅ Prev</button>
<button onclick="next()">Next ➡</button>
</div>

<div class="qr">
<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${p.nama}-${d.flight}">
</div>

<button class="pdf-btn" onclick="downloadPDF()">Download Ticket</button>

</div>
</div>
`;
}

/* NAV */
function next(){
if(index < current.penumpang.length-1){ index++; render(); }
}

function prev(){
if(index > 0){ index--; render(); }
}

/* PDF */
async function downloadPDF(){
const { jsPDF } = window.jspdf;
const ticket = document.getElementById("ticket");

const canvas = await html2canvas(ticket);
const img = canvas.toDataURL("image/png");

const pdf = new jsPDF({
orientation:"portrait",
unit:"px",
format:[canvas.width, canvas.height]
});

pdf.addImage(img,"PNG",0,0,canvas.width,canvas.height);
pdf.save("boarding-pass.pdf");
}

</script>

</body>
</html>
