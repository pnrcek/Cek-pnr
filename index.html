<!DOCTYPE html>
<html>
<head>
<title>Flight PNR Checker</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;

    background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url('https://images.unsplash.com/photo-1504196606672-aef5c9cefc92');

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

/* HEADER */
.header {
    text-align: center;
    color: white;
    font-size: 22px;
    font-weight: bold;
    padding: 20px;
}

/* CENTER */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.card {
    width: 360px;
    background: white;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #cc0000;
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: bold;
}

/* RESULT CARD */
.result {
    margin-top: 20px;
    padding: 15px;
    border-radius: 15px;
    background: #f5f5f5;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

/* LABEL */
.label {
    font-size: 12px;
    color: gray;
}

/* VALUE */
.value {
    font-weight: bold;
}

/* STATUS BADGE */
.badge {
    display: inline-block;
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
}

.green { background: #d4ffd4; color: green; }
.orange { background: #ffe7c2; color: orange; }
.red { background: #ffd4d4; color: red; }

</style>
</head>

<body>

<div class="header">✈️ Flight PNR Checker</div>

<div class="container">
<div class="card">

<input id="pnr" placeholder="Masukkan kode PNR">
<button onclick="cek()">Cek Status</button>

<div id="hasil"></div>

</div>
</div>

<script>

const data = {

"ABC123": {
nama: "Budi Santoso",
maskapai: "Lion Air",
flight: "JT-610",
dari: "CGK",
ke: "DPS",
jam: "08:30",
status: "Confirmed"
},

"XYZ789": {
nama: "Andi Saputra",
maskapai: "Garuda Indonesia",
flight: "GA-200",
dari: "CGK",
ke: "SUB",
jam: "13:45",
status: "Menunggu Pembayaran"
},

"QWE456": {
nama: "Siti Aminah",
maskapai: "AirAsia",
flight: "AK-101",
dari: "KUL",
ke: "CGK",
jam: "17:20",
status: "Confirmed"
}

};

function cek(){
let pnr = document.getElementById("pnr").value.toUpperCase();
let h = document.getElementById("hasil");

if(data[pnr]){

let d = data[pnr];

let warna = "green";
if(d.status == "Menunggu Pembayaran") warna = "orange";

h.innerHTML = `
<div class="result">

<div class="grid">
<div>
<div class="label">Nama</div>
<div class="value">${d.nama}</div>
</div>

<div>
<div class="label">Maskapai</div>
<div class="value">${d.maskapai}</div>
</div>

<div>
<div class="label">Flight</div>
<div class="value">${d.flight}</div>
</div>

<div>
<div class="label">Jam</div>
<div class="value">${d.jam}</div>
</div>

<div>
<div class="label">Dari</div>
<div class="value">${d.dari}</div>
</div>

<div>
<div class="label">Ke</div>
<div class="value">${d.ke}</div>
</div>
</div>

<br>

<div>
<div class="label">Status</div>
<span class="badge ${warna}">${d.status}</span>
</div>

</div>
`;

}else{

h.innerHTML = `
<div class="result" style="color:red;">
PNR tidak ditemukan
</div>
`;

}

}

</script>

</body>
</html>
