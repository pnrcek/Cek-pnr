<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight PNR Checker</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;

    background:
    linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
    url('https://images.unsplash.com/photo-1494412574643-ffbb57d2c2b3?auto=format&fit=crop&w=1470&q=80');

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

/* HEADER */
.header {
    text-align: center;
    color: white;
    font-size: 22px;
    font-weight: bold;
    padding: 20px;
}

/* CENTER */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 80vh;
}

/* CARD */
.card {
    width: 360px;
    padding: 25px;
    border-radius: 20px;

    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(15px);

    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    color: white;

    animation: fadeIn 0.8s ease;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;

    background: #cc0000;
    color: white;

    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;

    transition: 0.3s;
}

button:hover { transform: scale(1.05); background: #ff0000; }
button:active { transform: scale(0.95); }

/* RESULT */
.result {
    margin-top: 20px;
    padding: 15px;
    border-radius: 12px;
    background: rgba(255,255,255,0.2);
    animation: slideUp 0.5s ease;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.label {
    font-size: 12px;
    color: #ddd;
}

.value {
    font-weight: bold;
}

/* STATUS */
.badge {
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
}

.green { background: #00ff88; color: black; }
.orange { background: orange; color: black; }
.red { background: red; color: white; }

/* ANIMASI */
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

@keyframes slideUp {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

.loading {
    text-align: center;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="header">✈️ Flight PNR Checker</div>

<div class="container">
<div class="card">

<input id="pnr" placeholder="Masukkan kode PNR">
<button onclick="cek()">Cek Status</button>

<div id="hasil"></div>

</div>
</div>

<script>

/* DATABASE SIMULASI */
const data = {

"ABC123": {
nama: "Budi Santoso",
maskapai: "Lion Air",
flight: "JT-610",
dari: "CGK",
ke: "DPS",
jam: "08:30",
status: "Confirmed"
},

"XYZ789": {
nama: "Andi Saputra",
maskapai: "Garuda Indonesia",
flight: "GA-200",
dari: "CGK",
ke: "SUB",
jam: "13:45",
status: "Menunggu Pembayaran"
},

"QWE456": {
nama: "Siti Aminah",
maskapai: "AirAsia",
flight: "AK-101",
dari: "KUL",
ke: "CGK",
jam: "17:20",
status: "Confirmed"
}

};

/* FUNCTION */
function cek(){

let pnr = document.getElementById("pnr").value.toUpperCase();
let h = document.getElementById("hasil");

h.innerHTML = `<div class="loading">⏳ Mengecek data...</div>`;

setTimeout(() => {

if(data[pnr]){

let d = data[pnr];

let warna = "green";
if(d.status == "Menunggu Pembayaran") warna = "orange";

h.innerHTML = `
<div class="result">

<div class="grid">
<div><div class="label">Nama</div><div class="value">${d.nama}</div></div>
<div><div class="label">Maskapai</div><div class="value">${d.maskapai}</div></div>
<div><div class="label">Flight</div><div class="value">${d.flight}</div></div>
<div><div class="label">Jam</div><div class="value">${d.jam}</div></div>
<div><div class="label">Dari</div><div class="value">${d.dari}</div></div>
<div><div class="label">Ke</div><div class="value">${d.ke}</div></div>
</div>

<br>

<div>
<div class="label">Status</div>
<span class="badge ${warna}">${d.status}</span>
</div>

</div>
`;

}else{

h.innerHTML = `
<div class="result" style="color:red;">
PNR tidak ditemukan
</div>
`;

}

}, 800);

}

</script>

</body>
</html>
