<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PNR System</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0d47a1, #42a5f5);
}

.header {
    text-align: center;
    color: white;
    font-size: 24px;
    padding: 20px;
}

.container {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.card {
    width: 90%;
    max-width: 400px;
    background: rgba(255,255,255,0.15);
    padding: 20px;
    border-radius: 20px;
    margin-top: 20px;
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border-radius: 12px;
    border: none;
    background: #00a651;
    color: white;
}

/* TICKET */
.ticket {
    width: 90%;
    max-width: 400px;
    margin-top: 20px;
    border-radius: 20px;
    overflow: hidden;
    background: white;
}

.top {
    background: #0d47a1;
    color: white;
    text-align: center;
    padding: 15px;
}

.middle {
    padding: 15px;
    background: #f5f5f5;
    border-top: 2px dashed #ccc;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.label { font-size: 12px; color: gray; }
.value { font-weight: bold; }

.status {
    margin-top: 10px;
    padding: 8px;
    text-align: center;
    background: orange;
    border-radius: 20px;
}

.nav {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.nav button {
    width: 50%;
}

.qr {
    text-align: center;
    margin-top: 15px;
}

.pdf-btn {
    background: orange;
}
</style>
</head>

<body>

<div class="header">✈️ Boarding Pass</div>

<div class="container">

<div class="card">
<input id="pnr" placeholder="Masukkan kode booking">
<button onclick="cek()">Cek</button>
</div>

<div id="hasil"></div>

</div>

<!-- LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

let db = {};
let current = null;
let index = 0;

/* LOAD DATABASE */
fetch('database.json')
.then(res => res.json())
.then(data => db = data);

/* CEK */
function cek(){
let pnr = document.getElementById("pnr").value.toUpperCase();

if(!db[pnr]){
document.getElementById("hasil").innerHTML = `<div style="color:white;margin-top:20px;">PNR tidak ditemukan</div>`;
return;
}

current = db[pnr];
index = 0;
render();
}

/* RENDER */
function render(){
let d = current;
let p = d.penumpang[index];

document.getElementById("hasil").innerHTML = `
<div class="ticket" id="ticket">

<div class="top">
${d.dari} ✈ ${d.ke}<br>
<small>${d.kotaDari} → ${d.kotaKe}</small>
</div>

<div class="middle">

<div class="grid">
<div><div class="label">Nama</div><div class="value">${p.nama}</div></div>
<div><div class="label">Seat</div><div class="value">${p.seat}</div></div>

<div><div class="label">Flight</div><div class="value">${d.flight}</div></div>
<div><div class="label">Tanggal</div><div class="value">${d.tanggal}</div></div>

<div><div class="label">Boarding</div><div class="value">${d.boarding}</div></div>
<div><div class="label">Gate</div><div class="value">${d.gate}</div></div>

<div><div class="label">Terminal</div><div class="value">${d.terminal}</div></div>
</div>

<div class="status">${d.status}</div>

<div class="nav">
<button onclick="prev()">⬅ Prev</button>
<button onclick="next()">Next ➡</button>
</div>

<div class="qr">
<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${p.nama}">
</div>

<button class="pdf-btn" onclick="downloadPDF()">Download PDF</button>

</div>
</div>
`;
}

/* NAV */
function next(){
if(index < current.penumpang.length-1){
index++;
render();
}
}

function prev(){
if(index > 0){
index--;
render();
}
}

/* PDF */
async function downloadPDF(){
const { jsPDF } = window.jspdf;
const ticket = document.getElementById("ticket");

const canvas = await html2canvas(ticket);
const img = canvas.toDataURL("image/png");

const pdf = new jsPDF({
orientation:"portrait",
unit:"px",
format:[canvas.width, canvas.height]
});

pdf.addImage(img,"PNG",0,0,canvas.width,canvas.height);
pdf.save("boarding-pass.pdf");
}

</script>

</body>
</html>
