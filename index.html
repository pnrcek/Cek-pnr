<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PNR System</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0d47a1, #42a5f5);
}

.header {
    text-align: center;
    color: white;
    font-size: 24px;
    padding: 20px;
}

.container {
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* INPUT */
.card {
    width: 90%;
    max-width: 400px;
    background: rgba(255,255,255,0.15);
    padding: 20px;
    border-radius: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border-radius: 10px;
    border: none;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    background: #00c853;
    color: white;
    font-weight: bold;
}

/* TICKET */
.ticket {
    width: 90%;
    max-width: 400px;
    margin-top: 20px;
    border-radius: 20px;
    overflow: hidden;
    background: white;
}

.top {
    background: #0d47a1;
    color: white;
    text-align: center;
    padding: 15px;
}

.middle {
    padding: 15px;
    background: #f5f5f5;
    border-top: 2px dashed #ccc;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.label { font-size: 12px; color: gray; }
.value { font-weight: bold; }

.status {
    margin-top: 10px;
    padding: 8px;
    text-align: center;
    background: orange;
    border-radius: 20px;
}

.nav {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.nav button {
    width: 50%;
}

.qr {
    text-align: center;
    margin-top: 15px;
}

.pdf-btn {
    background: orange;
}

.admin {
    background: #222;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="header">✈️ PNR System</div>

<div class="container">

<!-- INPUT PNR -->
<div class="card">
<input id="pnr" placeholder="Masukkan kode booking">
<button onclick="cek()">Cek Tiket</button>
</div>

<!-- ADMIN INPUT -->
<div class="card">
<h3 style="color:white;">Admin Input</h3>

<input id="a_pnr" placeholder="PNR">
<input id="a_nama" placeholder="Nama">
<input id="a_seat" placeholder="Seat">
<input id="a_flight" placeholder="Flight">
<input id="a_dari" placeholder="Dari">
<input id="a_ke" placeholder="Ke">
<input id="a_tanggal" placeholder="Tanggal">
<input id="a_boarding" placeholder="Boarding">
<input id="a_gate" placeholder="Gate">
<input id="a_terminal" placeholder="Terminal">
<input id="a_status" placeholder="Status">

<button class="admin" onclick="simpan()">Simpan Tiket</button>
</div>

<div id="hasil"></div>

</div>

<!-- LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

let current = null;
let index = 0;

/* CEK PNR */
function cek(){
let pnr = document.getElementById("pnr").value.toUpperCase();
let data = localStorage.getItem(pnr);

if(!data){
document.getElementById("hasil").innerHTML = `<div style="color:white">PNR tidak ditemukan</div>`;
return;
}

current = JSON.parse(data);
index = 0;
render();
}

/* SIMPAN DATA (ADMIN) */
function simpan(){
let pnr = document.getElementById("a_pnr").value.toUpperCase();

let data = {
flight: document.getElementById("a_flight").value,
dari: document.getElementById("a_dari").value,
ke: document.getElementById("a_ke").value,
tanggal: document.getElementById("a_tanggal").value,
boarding: document.getElementById("a_boarding").value,
gate: document.getElementById("a_gate").value,
terminal: document.getElementById("a_terminal").value,
status: document.getElementById("a_status").value,
penumpang: [
{
nama: document.getElementById("a_nama").value,
seat: document.getElementById("a_seat").value
}
]
};

localStorage.setItem(pnr, JSON.stringify(data));

alert("Tiket tersimpan!");
}

/* RENDER */
function render(){
let d = current;
let p = d.penumpang[index];

document.getElementById("hasil").innerHTML = `
<div class="ticket" id="ticket">

<div class="top">
${d.dari} ✈ ${d.ke}
</div>

<div class="middle">

<div class="grid">
<div><div class="label">Nama</div><div class="value">${p.nama}</div></div>
<div><div class="label">Seat</div><div class="value">${p.seat}</div></div>

<div><div class="label">Flight</div><div class="value">${d.flight}</div></div>
<div><div class="label">Tanggal</div><div class="value">${d.tanggal}</div></div>

<div><div class="label">Boarding</div><div class="value">${d.boarding}</div></div>
<div><div class="label">Gate</div><div class="value">${d.gate}</div></div>

<div><div class="label">Terminal</div><div class="value">${d.terminal}</div></div>
</div>

<div class="status">${d.status}</div>

<div class="nav">
<button onclick="prev()">⬅ Prev</button>
<button onclick="next()">Next ➡</button>
</div>

<div class="qr">
<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${p.nama}">
</div>

<button class="pdf-btn" onclick="downloadPDF()">Download PDF</button>

</div>
</div>
`;
}

/* NAV */
function next(){
if(index < current.penumpang.length-1){
index++;
render();
}
}

function prev(){
if(index > 0){
index--;
render();
}
}

/* PDF */
async function downloadPDF(){
const { jsPDF } = window.jspdf;
const ticket = document.getElementById("ticket");

const canvas = await html2canvas(ticket);
const img = canvas.toDataURL("image/png");

const pdf = new jsPDF({
orientation:"portrait",
unit:"px",
format:[canvas.width, canvas.height]
});

pdf.addImage(img,"PNG",0,0,canvas.width,canvas.height);
pdf.save("boarding-pass.pdf");
}

</script>

</body>
</html>
