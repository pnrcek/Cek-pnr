<!DOCTYPE html>
<html>
<head>
<title>Cek PNR - Lion Air</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: #cc0000; /* merah polos */
}

/* container */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* card */
.card {
    background: rgba(255,255,255,0.95);
    padding: 30px;
    border-radius: 16px;
    width: 350px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.4);
}

/* logo */
.logo {
    width: 110px;
    margin-bottom: 15px;
}

/* title */
h2 {
    margin-bottom: 10px;
    color: #b30000;
}

/* subtitle */
.subtitle {
    font-size: 14px;
    color: #666;
    margin-bottom: 20px;
}

/* input */
input {
    width: 90%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    outline: none;
    font-size: 15px;
}

input:focus {
    border-color: red;
}

/* button */
button {
    width: 95%;
    padding: 12px;
    background: #cc0000;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #ff1a1a;
}

/* result */
#hasil {
    margin-top: 20px;
    padding: 10px;
    border-radius: 10px;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="container">

<div class="card">

<img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/0/0c/Lion_Air_logo.svg">

<h2>Cek PNR</h2>
<p class="subtitle">Masukkan kode booking Anda</p>

<input type="text" id="pnr" placeholder="Contoh: ABC123">

<button onclick="cek()">Cek Status</button>

<div id="hasil"></div>

</div>

</div>

<script>

const data = {
"zyhil4": { nama: "aldi", status: "menunggu pembayaran" },
"XYZ789": { nama: "Andi", status: "Boarding" },
"QWE456": { nama: "Siti", status: "Delayed" },
"RTY321": { nama: "Joko", status: "Cancelled" }
};

function cek() {
    let pnr = document.getElementById("pnr").value.toUpperCase();
    let hasil = document.getElementById("hasil");

    hasil.innerHTML = "⏳ Mengecek...";

    setTimeout(() => {
        if (data[pnr]) {
            let status = data[pnr].status;
            let warna = "black";

            if (status === "Confirmed") warna = "green";
            if (status === "Boarding") warna = "blue";
            if (status === "menunggu pembayaran") warna = "orange";
            if (status === "Cancelled") warna = "red";

            hasil.innerHTML =
                "✔ " + data[pnr].nama +
                "<br>Status: <span style='color:" + warna + "'>" + status + "</span>";
        } else {
            hasil.innerHTML = "<span style='color:red'>PNR tidak ditemukan</span>";
        }
    }, 800);
}

/* ENTER */
document.getElementById("pnr").addEventListener("keypress", function(e) {
    if (e.key === "Enter") cek();
});

</script>

</body>
</html>
