<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PNR System</title>

<style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0d47a1, #42a5f5);
}

/* HEADER */
.header {
    text-align: center;
    color: white;
    font-size: 24px;
    font-weight: bold;
    padding: 20px;
}

/* CONTAINER */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* CARD INPUT */
.card {
    width: 90%;
    max-width: 400px;
    background: rgba(255,255,255,0.15);
    padding: 20px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #00c853, #00a651);
    color: white;
    font-size: 16px;
    font-weight: bold;
}

/* TICKET */
.ticket {
    width: 90%;
    max-width: 400px;
    margin-top: 20px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

/* TOP */
.top {
    background: linear-gradient(135deg, #0d47a1, #1976d2);
    color: white;
    text-align: center;
    padding: 18px;
    font-size: 22px;
    font-weight: bold;
}

/* MIDDLE */
.middle {
    background: #f5f5f5;
    padding: 15px;
    border-top: 2px dashed #bbb;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
}

.label {
    font-size: 12px;
    color: gray;
}

.value {
    font-weight: bold;
}

/* STATUS */
.status {
    margin-top: 12px;
    padding: 10px;
    border-radius: 25px;
    font-weight: bold;
    text-align: center;
    background: linear-gradient(135deg, orange, #ffcc80);
}

/* NAV */
.nav {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

.nav button {
    width: 48%;
}

/* QR */
.qr {
    text-align: center;
    margin-top: 15px;
}

.qr img {
    width: 120px;
    background: white;
    padding: 8px;
    border-radius: 10px;
}

</style>
</head>

<body>

<div class="header">✈️ PNR System</div>

<div class="container">

<div class="card">
<input id="pnr" placeholder="Masukkan kode booking">
<button onclick="cek()">Cek</button>
</div>

<div id="hasil"></div>

</div>

<script>

const database = {
"RVL789": [
{
nama: "Rivaldi Pratama",
seat: "12A"
},
{
nama: "Andi Saputra",
seat: "12B"
}
]
};

const detail = {
flight: "QG-812",
dari: "UPG",
dari_full: "Makassar",
ke: "DJJ",
ke_full: "Jayapura",
tanggal: "10 Apr 2026",
boarding: "08:30",
gate: "4",
terminal: "1",
status: "Menunggu Pembayaran"
};

let index = 0;
let list = [];

function cek(){
let pnr = document.getElementById("pnr").value.toUpperCase();
let h = document.getElementById("hasil");

if(database[pnr]){
list = database[pnr];
index = 0;
render();
}else{
h.innerHTML = `<div style="color:white;margin-top:20px;">PNR tidak ditemukan</div>`;
}
}

function render(){

let d = list[index];

document.getElementById("hasil").innerHTML = `
<div class="ticket">

<div class="top">
${detail.dari} ✈ ${detail.ke}<br>
<small>${detail.dari_full} → ${detail.ke_full}</small>
</div>

<div class="middle">

<div class="grid">
<div><div class="label">Nama</div><div class="value">${d.nama}</div></div>
<div><div class="label">Seat</div><div class="value">${d.seat}</div></div>

<div><div class="label">Flight</div><div class="value">${detail.flight}</div></div>
<div><div class="label">Tanggal</div><div class="value">${detail.tanggal}</div></div>

<div><div class="label">Boarding</div><div class="value">${detail.boarding}</div></div>
<div><div class="label">Gate</div><div class="value">${detail.gate}</div></div>

<div><div class="label">Terminal</div><div class="value">${detail.terminal}</div></div>
</div>

<div class="status">${detail.status}</div>

<div class="nav">
<button onclick="prev()">⬅ Prev</button>
<button onclick="next()">Next ➡</button>
</div>

<div class="qr">
<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${d.nama}">
</div>

</div>
</div>
`;
}

function next(){
if(index < list.length-1){
index++;
render();
}
}

function prev(){
if(index > 0){
index--;
render();
}
}

</script>

</body>
</html>
