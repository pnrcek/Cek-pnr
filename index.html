<!DOCTYPE html>
<html>
<head>
<title>Cek PNR Sederhana</title>

<style>
body {
    font-family: Arial;
    background: #cc0000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 300px;
    text-align: center;
}

h2 {
    color: #cc0000;
}

input {
    padding: 10px;
    width: 80%;
    margin: 10px 0;
}

button {
    padding: 10px 20px;
    background: #cc0000;
    color: white;
    border: none;
}

#hasil {
    margin-top: 10px;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="card">
<h2>Cek PNR</h2>

<input type="text" id="pnr" placeholder="Masukkan PNR">
<br>
<button onclick="cek()">Cek</button>

<p id="hasil"></p>
</div>

<script>

const data = {
    "ABC123": { nama: "Budi", status: "Confirmed" },
    "XYZ789": { nama: "Andi", status: "Boarding" },
    "QWE456": { nama: "Siti", status: "Delayed" }
};

function cek() {
    let pnr = document.getElementById("pnr").value.toUpperCase();
    let hasil = document.getElementById("hasil");

    if (data[pnr]) {
        hasil.innerHTML = data[pnr].nama + " - " + data[pnr].status;
    } else {
        hasil.innerHTML = "PNR tidak ditemukan";
    }
}

</script>

</body>
</html>
