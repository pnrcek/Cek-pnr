<!DOCTYPE html>
<html>
<head>
<title>Cek PNR - Lion Air</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;

    background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url('https://images.unsplash.com/photo-1540962351504-03099e0a754b');

    background-size: cover;
    background-position: center;
}

/* CENTER */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.card {
    background: white;
    padding: 25px;
    border-radius: 15px;
    width: 340px;
    box-shadow: 0 15px 50px rgba(0,0,0,0.5);
}

/* TITLE */
.title {
    text-align: center;
    color: #cc0000;
    font-size: 22px;
    font-weight: bold;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #cc0000;
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: bold;
}

/* RESULT BOX */
.result {
    margin-top: 20px;
    padding: 15px;
    background: #f5f5f5;
    border-radius: 10px;
}

/* STATUS */
.status {
    font-weight: bold;
}

.green { color: green; }
.orange { color: orange; }
.red { color: red; }

</style>
</head>

<body>

<div class="container">
<div class="card">

<div class="title">Cek PNR Lion Air</div>

<input id="pnr" placeholder="Masukkan kode PNR">
<button onclick="cek()">Cek Status</button>

<div id="hasil"></div>

</div>
</div>

<script>

const data = {

"ABC123": {
nama: "Budi Santoso",
flight: "JT-610",
dari: "CGK (Jakarta)",
ke: "DPS (Bali)",
jam: "08:30",
status: "Confirmed"
},

"XYZ789": {
nama: "Andi Saputra",
flight: "JT-245",
dari: "CGK (Jakarta)",
ke: "SUB (Surabaya)",
jam: "13:45",
status: "Menunggu Pembayaran"
}

};

function cek(){
let pnr = document.getElementById("pnr").value.toUpperCase();
let h = document.getElementById("hasil");

if(data[pnr]){

let d = data[pnr];

let warna = "green";
if(d.status == "Menunggu Pembayaran") warna = "orange";

h.innerHTML = `
<div class="result">
<b>Nama:</b> ${d.nama}<br>
<b>Flight:</b> ${d.flight}<br>
<b>Rute:</b> ${d.dari} → ${d.ke}<br>
<b>Jam Berangkat:</b> ${d.jam}<br>
<b>Status:</b> <span class="status ${warna}">${d.status}</span>
</div>
`;

}else{

h.innerHTML = `
<div class="result" style="color:red;">
PNR tidak ditemukan
</div>
`;

}

}

</script>

</body>
</html>
