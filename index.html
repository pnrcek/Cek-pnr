<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Cek PNR</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      text-align: center;
      padding: 50px;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 350px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    input {
      padding: 10px;
      width: 80%;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .result {
      margin-top: 20px;
      text-align: left;
    }

    .status {
      padding: 8px;
      border-radius: 5px;
      display: inline-block;
      font-weight: bold;
    }

    .pending {
      background: yellow;
      color: black;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Cek PNR</h2>
  <input type="text" id="pnrInput" placeholder="Masukkan kode PNR">
  <br>
  <button onclick="cekPNR()">Cek</button>

  <div id="hasil" class="result"></div>
</div>

<script>
  // Data dummy PNR
  const dataPNR = {
    "ABC123": {
      nama: "Budi Santoso",
      penerbangan: "GA-210",
      jam: "08:30",
      asal: "CGK",
      tujuan: "DPS",
      status: "Menunggu Pembayaran"
    },
    "XYZ789": {
      nama: "Siti Aminah",
      penerbangan: "JT-555",
      jam: "14:15",
      asal: "SUB",
      tujuan: "UPG",
      status: "Menunggu Pembayaran"
    }
  };

  function cekPNR() {
    const pnr = document.getElementById("pnrInput").value.toUpperCase();
    const hasil = document.getElementById("hasil");

    if (dataPNR[pnr]) {
      const data = dataPNR[pnr];

      hasil.innerHTML = `
        <p><strong>Nama Penumpang:</strong> ${data.nama}</p>
        <p><strong>Kode Penerbangan:</strong> ${data.penerbangan}</p>
        <p><strong>Jam Keberangkatan:</strong> ${data.jam}</p>
        <p><strong>Bandara:</strong> ${data.asal} → ${data.tujuan}</p>
        <p><strong>Status:</strong> 
          <span class="status pending">${data.status}</span>
        </p>
      `;
    } else {
      hasil.innerHTML = "<p>PNR tidak ditemukan</p>";
    }
  }
</script>

</body>
</html>
