<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cek Tiket</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0d47a1,#42a5f5);
    color: white;
}

.header {
    text-align: center;
    padding: 20px;
    font-size: 22px;
    font-weight: bold;
}

.search {
    max-width: 400px;
    margin: auto;
    padding: 15px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    background: #00c853;
    color: white;
    font-weight: bold;
}

.ticket {
    max-width: 400px;
    margin: 20px auto;
    border-radius: 20px;
    overflow: hidden;
    background: white;
    color: black;
}

.top {
    padding: 15px;
    color: white;
}

.middle {
    padding: 15px;
    background: #f5f5f5;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.label { font-size: 12px; color: gray; }
.value { font-weight: bold; }

.status {
    text-align: center;
    padding: 10px;
    border-radius: 20px;
    margin-top: 10px;
    font-weight: bold;
}

.qr {
    text-align: center;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">✈️ Cek Tiket</div>

<div class="search">
<input id="pnr" placeholder="Masukkan kode booking">
<button onclick="cek()">Cek</button>
</div>

<div id="hasil"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "ISI_APIKEY",
  authDomain: "ISI_DOMAIN",
  projectId: "ISI_PROJECT_ID",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function cek(){
let pnr = document.getElementById("pnr").value.toUpperCase();

let doc = await db.collection("tickets").doc(pnr).get();

if(!doc.exists){
document.getElementById("hasil").innerHTML = "❌ PNR tidak ditemukan";
return;
}

let d = doc.data();
let p = d.penumpang[0];

let warna = "#1565c0";
if(d.maskapai.toLowerCase().includes("lion")) warna="#d32f2f";
if(d.maskapai.toLowerCase().includes("citilink")) warna="#00c853";

document.getElementById("hasil").innerHTML = `
<div class="ticket">

<div class="top" style="background:${warna}">
<b>${d.maskapai}</b><br>
<b style="font-size:20px">${d.dari} → ${d.ke}</b>
</div>

<div class="middle">

<div class="grid">
<div><div class="label">Passenger</div><div class="value">${p.nama}</div></div>
<div><div class="label">Seat</div><div class="value">${p.seat}</div></div>

<div><div class="label">Flight</div><div class="value">${d.flight}</div></div>
<div><div class="label">Date</div><div class="value">${d.tanggal}</div></div>

<div><div class="label">Boarding</div><div class="value">${d.boarding}</div></div>
<div><div class="label">Gate</div><div class="value">${d.gate}</div></div>

<div><div class="label">Terminal</div><div class="value">${d.terminal}</div></div>
</div>

<div class="status">${d.status}</div>

<div class="qr">
<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${pnr}">
</div>

</div>
</div>
`;
}
</script>

</body>
</html>
