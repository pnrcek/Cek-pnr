<!DOCTYPE html>
<html>
<head>
<title>Cek PNR - Lion Air</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
    url('https://images.unsplash.com/photo-1504196606672-aef5c9cefc92');
    background-size: cover;
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 15px;
    width: 350px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

h2 {
    text-align: center;
    color: red;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

button {
    width: 100%;
    padding: 10px;
    background: red;
    color: white;
    border: none;
}

#hasil {
    margin-top: 15px;
    font-size: 14px;
}
</style>

</head>

<body>

<div class="container">
<div class="card">

<h2>Cek PNR</h2>

<input id="pnr" placeholder="Masukkan PNR">
<button onclick="cek()">Cek</button>

<div id="hasil"></div>

</div>
</div>

<script>

const data = {
"ABC123": {
nama: "Budi Santoso",
flight: "JT-610",
dari: "CGK",
ke: "DPS",
jam: "08:30",
status: "Confirmed"
},
"RTY321": {
nama: "Joko",
flight: "JT-777",
dari: "CGK",
ke: "PLM",
jam: "15:00",
status: "Menunggu Pembayaran"
}
};

function cek(){
let pnr = document.getElementById("pnr").value.toUpperCase();
let h = document.getElementById("hasil");

if(data[pnr]){
let d = data[pnr];

h.innerHTML = `
Nama: ${d.nama}<br>
Flight: ${d.flight}<br>
Rute: ${d.dari} → ${d.ke}<br>
Jam: ${d.jam}<br>
Status: ${d.status}
`;

}else{
h.innerHTML = "PNR tidak ditemukan";
}
}

</script>

</body>
</html>
