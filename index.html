<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight PNR Checker</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f4c81, #1e90ff);
}

/* HEADER */
.header {
    text-align: center;
    color: white;
    font-size: 24px;
    font-weight: bold;
    padding: 25px;
}

/* CONTAINER */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 80vh;
}

/* CARD */
.card {
    width: 380px;
    padding: 25px;
    border-radius: 25px;

    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(25px);
    border: 1px solid rgba(255,255,255,0.2);

    box-shadow: 0 25px 70px rgba(0,0,0,0.5);
    color: white;
    margin: 10px;
}

/* INPUT */
input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-size: 14px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    background: #00a651;
    color: white;
    border: none;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* RESULT */
.result {
    margin-top: 20px;
    padding: 18px;
    border-radius: 18px;
    background: rgba(255,255,255,0.2);
    animation: fadeIn 0.4s ease;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.label {
    font-size: 11px;
    opacity: 0.7;
}

.value {
    font-size: 16px;
    font-weight: 700;
}

/* STATUS */
.badge {
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
}

.orange { background: orange; color: black; }
.green { background: #00ff88; color: black; }
.red { background: red; color: white; }

/* ANIMATION */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px);}
    to { opacity: 1; transform: translateY(0);}
}

.loading {
    text-align: center;
}
</style>
</head>

<body>

<div class="header">✈️ Flight PNR Checker</div>

<div class="container">
<div class="card">

<input id="pnr" placeholder="Masukkan kode booking">
<button onclick="cek()">Cek Status</button>

<div id="hasil"></div>

</div>
</div>

<script>

const data = {

"RVL789": {
nama: "Rivaldi Pratama",
maskapai: "Citilink",
flight: "QG-812",
dari: "UPG — Makassar",
ke: "DJJ — Jayapura",
tanggal: "Kamis, 10 April 2026",
jam: "09:15",
boarding: "08:30",
gate: "Gate 4",
seat: "12A",
terminal: "Terminal 1",
kelas: "Economy",
bagasi: "20 kg",
status: "Menunggu Pembayaran"
}

};

function cek(){

let pnr = document.getElementById("pnr").value.toUpperCase();
let h = document.getElementById("hasil");

h.innerHTML = `<div class="loading">⏳ Checking data...</div>`;

setTimeout(() => {

if(data[pnr]){

let d = data[pnr];

/* STATUS COLOR AUTO */
let warna = "orange";
if(d.status === "Confirmed") warna = "green";
if(d.status === "Cancelled") warna = "red";

h.innerHTML = `
<div class="result">

<div class="grid">
<div><div class="label">Passenger</div><div class="value">${d.nama}</div></div>
<div><div class="label">Airline</div><div class="value">${d.maskapai}</div></div>

<div><div class="label">Flight</div><div class="value">${d.flight}</div></div>
<div><div class="label">Date</div><div class="value">${d.tanggal}</div></div>

<div><div class="label">From</div><div class="value">${d.dari}</div></div>
<div><div class="label">To</div><div class="value">${d.ke}</div></div>

<div><div class="label">Departure</div><div class="value">${d.jam}</div></div>
<div><div class="label">Boarding</div><div class="value">${d.boarding}</div></div>

<div><div class="label">Gate</div><div class="value">${d.gate}</div></div>
<div><div class="label">Seat</div><div class="value">${d.seat}</div></div>

<div><div class="label">Terminal</div><div class="value">${d.terminal}</div></div>
<div><div class="label">Baggage</div><div class="value">${d.bagasi}</div></div>
</div>

<br>

<div>
<div class="label">Status</div>
<span class="badge ${warna}">${d.status}</span>
</div>

</div>
`;

}else{

h.innerHTML = `
<div class="result" style="color:red;">
PNR tidak ditemukan
</div>
`;

}

}, 800);

}

</script>

</body>
</html>
