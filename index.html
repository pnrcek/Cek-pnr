<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boarding Pass</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f4c81, #1e90ff);
    color: white;
}

/* HEADER */
.header {
    text-align: center;
    padding: 20px;
    font-size: 24px;
    font-weight: bold;
}

/* CONTAINER */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 85vh;
}

/* BOARDING PASS */
.ticket {
    width: 380px;
    border-radius: 25px;
    overflow: hidden;
    background: white;
    color: black;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

/* TOP */
.top {
    background: #0f4c81;
    color: white;
    padding: 20px;
}

.route {
    font-size: 28px;
    font-weight: bold;
    text-align: center;
}

/* MIDDLE */
.middle {
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.label {
    font-size: 11px;
    color: gray;
}

.value {
    font-weight: bold;
    font-size: 15px;
}

/* STATUS */
.status {
    margin-top: 10px;
    padding: 8px;
    text-align: center;
    border-radius: 20px;
    background: orange;
    font-weight: bold;
}

/* QR */
.qr {
    text-align: center;
    padding: 20px;
}

.qr img {
    width: 120px;
}
</style>
</head>

<body>

<div class="header">✈️ Boarding Pass</div>

<div class="container">
<div class="ticket">

<div class="top">
    <div class="route">UPG ✈ DJJ</div>
    <div style="text-align:center; font-size:13px;">Makassar → Jayapura</div>
</div>

<div class="middle">

<div class="grid">
<div><div class="label">Nama</div><div class="value">Rivaldi Pratama</div></div>
<div><div class="label">Maskapai</div><div class="value">Citilink</div></div>

<div><div class="label">Flight</div><div class="value">QG-812</div></div>
<div><div class="label">Seat</div><div class="value">12A</div></div>

<div><div class="label">Tanggal</div><div class="value">10 Apr 2026</div></div>
<div><div class="label">Boarding</div><div class="value">08:30</div></div>

<div><div class="label">Gate</div><div class="value">4</div></div>
<div><div class="label">Terminal</div><div class="value">1</div></div>
</div>

<div class="status">Menunggu Pembayaran</div>

</div>

<div class="qr">
<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=RVL789">
</div>

</div>
</div>

</body>
</html>
