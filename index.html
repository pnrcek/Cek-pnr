<!DOCTYPE html>
<html>
<head>
<title>Cek PNR - Flight Checker</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;

    background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url('https://images.unsplash.com/photo-1504196606672-aef5c9cefc92');

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

/* CENTER */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD GLASS */
.card {
    width: 360px;
    padding: 25px;
    border-radius: 20px;

    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);

    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    color: white;
}

/* TITLE */
.title {
    text-align: center;
    font-size: 22px;
    font-weight: bold;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border-radius: 10px;
    border: none;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;

    background: #cc0000;
    color: white;

    border: none;
    border-radius: 10px;

    font-weight: bold;
}

/* RESULT */
.result {
    margin-top: 20px;
    padding: 15px;
    border-radius: 12px;
    background: rgba(255,255,255,0.2);
}

/* STATUS */
.green { color: #00ff88; }
.orange { color: orange; }
.red { color: red; }

</style>
</head>

<body>

<div class="container">
<div class="card">

<div class="title">✈️ Flight PNR Checker</div>

<input id="pnr" placeholder="Masukkan kode PNR">
<button onclick="cek()">Cek Status</button>

<div id="hasil"></div>

</div>
</div>

<script>

const data = {

"ABC123": {
nama: "Budi Santoso",
maskapai: "Lion Air",
flight: "JT-610",
dari: "CGK (Jakarta)",
ke: "DPS (Bali)",
jam: "08:30",
status: "Confirmed"
},

"XYZ789": {
nama: "Andi Saputra",
maskapai: "Garuda Indonesia",
flight: "GA-200",
dari: "CGK (Jakarta)",
ke: "SUB (Surabaya)",
jam: "13:45",
status: "Menunggu Pembayaran"
},

"QWE456": {
nama: "Siti Aminah",
maskapai: "AirAsia",
flight: "AK-101",
dari: "KUL (Malaysia)",
ke: "CGK (Jakarta)",
jam: "17:20",
status: "Confirmed"
}

};

function cek(){
let pnr = document.getElementById("pnr").value.toUpperCase();
let h = document.getElementById("hasil");

if(data[pnr]){

let d = data[pnr];

let warna = "green";
if(d.status == "Menunggu Pembayaran") warna = "orange";

h.innerHTML = `
<div class="result">
<b>Nama:</b> ${d.nama}<br>
<b>Maskapai:</b> ${d.maskapai}<br>
<b>Flight:</b> ${d.flight}<br>
<b>Rute:</b> ${d.dari} → ${d.ke}<br>
<b>Jam Berangkat:</b> ${d.jam}<br>
<b>Status:</b> <span class="${warna}">${d.status}</span>
</div>
`;

}else{

h.innerHTML = `
<div class="result" style="color:red;">
PNR tidak ditemukan
</div>
`;

}

}

</script>

</body>
</html>
